name: Daily Prices Update and Cleanup

on:
  schedule:
    # Runs every night at 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:
    # Allows manual trigger via the GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install ijson libsql-client

      - name: Download Prices Data from MTGJSON
        run: |
          echo "Downloading AllPrices.json..."
          wget -qO AllPrices.json https://mtgjson.com/api/v5/AllPrices.json

      - name: Execute Price Update and Cleanup
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python3 update_prices.py
